services:
  php:
    build: .
    ports:
      - '8000:8000'
    volumes:
      - ./src:/var/www/html

  browsersync:
    image: ustwo/browser-sync:latest
    command: ['start', '--proxy', 'php:8000', '--files', './**/*', '--port', '3000', '--no-open']
    ports:
      - '3000:3000'
      - '3001:3001'
    volumes:
      - ./src:/source
    depends_on:
      - php

  mago:
    image: ghcr.io/carthage-software/mago:1
    volumes:
      - ./src:/app
      - ./mago.toml:/app/mago.toml
    working_dir: /app
    command: fmt
    profiles:
      - tools
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"